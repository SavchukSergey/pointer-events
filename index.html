<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>poiner-gestures</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" type="text/css" href="css/index.css" />
    </head>
    <body>
        <div class="container">
            <img class="target" src="img/image.jpg" />
        </div>

        <label>
            <input type="checkbox" id="touch-emulation" /> Enable Touch
            Emulation
        </label>

        <label>
            <input type="checkbox" id="options-zoom" checked="checked" /> Enable
            Zoom
        </label>

        <label>
            <input type="checkbox" id="options-rotate" checked="checked" />
            Enable Rotate
        </label>

        <label>
            <input type="checkbox" id="options-skew" checked="checked" /> Enable
            Skew
        </label>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script
            src="js/index.js"
            type="module"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
